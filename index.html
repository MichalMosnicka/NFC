        // Funkce pro SHA-256 hashov谩n铆 hesla
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        // Pomocn谩 funkce pro bezpe膷n茅 de拧ifrov谩n铆 textu (UTF-8 Base64)
        function de拧ifruj(text) {
            const binarniString = atob(text);
            const bajty = new Uint8Array(binarniString.length);
            for (let i = 0; i < binarniString.length; i++) {
                bajty[i] = binarniString.charCodeAt(i);
            }
            return new TextDecoder().decode(bajty);
        }

        // Hlavn铆 ov臎艡en铆
        async function overHeslo() {
            const zadaneHeslo = document.getElementById("hesloInput").value;
            const chybaElement = document.getElementById("chyba");
