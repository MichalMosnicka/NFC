<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje NFC Věta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 0;
        }
        .hidden {
            display: none;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        input[type="password"]:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 85%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #chyba {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="box">
        <div id="prijhlaseni">
            <h2>Zadej heslo</h2>
            <input type="password" id="hesloInput" placeholder="Napiš heslo sem...">
            <br>
            <button onclick="overHeslo()">Vstoupit</button>
            <p id="chyba"></p>
        </div>

        <div id="obsah" class="hidden">
            <h1 id="veta">Načítám...</h1>
        </div>
    </div>

    <script>
        // Jednoduché heslo bez šifrování
        const SPRAVNE_HESLO = "18725";

        // Tady je tvých 30 vět
        const vety = [
                        “Anet, chci ti jen tak říct, jak moc si tě vážím.“
                        “Jsem hrozně rád, že na všechny tyhle věci nejsem sám a mám vedle sebe právě tebe.“
                        “Když se podívám zpátky, je neskutečný, co alles jsi už se mnou zvládla.“
“Jsem na tebe fakt pyšnej za to, jak skvěle to se mnou všechno dáváš.“
“Pohled na tebe mě naplňuje obrovskou hrdostí.“
“Vážně obdivuju, jak se mnou zvládáš každé těžší období.“
“Jsem pyšnej na to, jakou oporu v tobě mám.“
“S tebou vedle sebe mám pocit, že zvládnu úplně cokoli.“
“Jsi moje největší motivace a motor, co mě táhne dopředu.“
“Děkuju za to, jak skvěle se mnou zvládáš i ty nejsložitější dny.“
“Seš pro mě ta nejlepší parťačka a hrozně moc mě baví tvoje energie.“
“S tebou se vůbec nebojím toho, co bude dál, protože vím, že to se mnou vždycky nějak vymyslíš.“
“Miluju tě and jsem fakt vděčnej za to, co pro mě znamenáš.“
“Seš pro mě ta nejúžasnější holka na světě a chci, abys to věděla.“
“Nikdy mě nepřestane bavit, jak mě dokážeš rozesmát.“
“Máš hrozně dobrý srdce a já jsem ten nejšťastnější chlap, že tě mám.“
“Obdivuju tvůj klid a to, jak mě dokážeš vždycky hodit do pohody.“
“Jsi prostě dokonalá přesně taková, jaká jsi.“
“Tvůj úsměv mi spolehlivě zlepší náladu, i když mám zrovna blbej den.“
“Seš ta nejlepší ženská, jakou jsem mohl v životě potkat.“
“Slibuju, že tu pro tebe budu vždycky, když mě budeš potřebovat.“
“Jsi pro mě jistota a místo, kde je mi vždycky nejlíp.“
“Chci na sobě pořád pracovat, abys na mě mohla být taky pyšná.“
“S tebou má můj život prostě mnohem větší grády a smysl.“
“Vím, že to se mnou občas není lehký, a o to víc si tě vážím.“
“Tvoje podpora pro mě znamená víc, než si vůbec dokážeš představit.“
“Děkuju za všechno, co pro mě děláš, dává mi to hrozně moc síly.“
“Stačí mi s tebou jen tak sedět a mlčet, a hned je mi líp.“
“Těším se na všechno další, co mě s tebou v životě čeká.“
“Jsi to nejlepší, co mě mohlo potkat, a nikdy tě nechci ztratit.“

        ];

        // Funkce pro jednoduché ověření hesla
        function overHeslo() {
            const zadaneHeslo = document.getElementById("hesloInput").value;
            const chybaElement = document.getElementById("chyba");

            // Porovnáme text napřímo
            if (zadaneHeslo === SPRAVNE_HESLO) {
                document.getElementById("prijhlaseni").classList.add("hidden");
                document.getElementById("obsah").classList.remove("hidden");
                ukazNahodnouVetu();
            } else {
                chybaElement.innerText = "Nesprávné heslo, zkus to znovu.";
                document.getElementById("hesloInput").value = "";
            }
        }

        // Funkce, která vybere náhodnou větu
        function ukazNahodnouVetu() {
            const nahodneCislo = Math.floor(Math.random() * vety.length);
            document.getElementById("veta").innerText = vety[nahodneCislo];
        }

        // Spuštění přes Enter
        document.getElementById("hesloInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                overHeslo();
            }
        });
    </script>

</body>
</html>
