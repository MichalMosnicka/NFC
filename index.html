<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje NFC Věta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 0;
        }
        .hidden {
            display: none;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        input[type="password"]:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 85%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #chyba {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="box">
        <div id="prijhlaseni">
            <h2>Zadej heslo</h2>
            <input type="password" id="hesloInput" placeholder="Napiš heslo sem...">
            <br>
            <button onclick="overHeslo()">Vstoupit</button>
            <p id="chyba"></p>
        </div>

        <div id="obsah" class="hidden">
            <h1 id="veta">Načítám...</h1>
        </div>
    </div>

            "5365c5a1622070726f206dc49b207461206e656acf9da5e56e4e6a7F6e4e20686f6c6b61206e61207376c49b74c49b20616e6420636863692c206162797320746f207664c49b64c49b6c612e",
            "4e696b6479206dc49b206e6570c599657374616e652062617669742c206a616b206dc49b20646f6b61c5be65c5a120726f7a656d4e742e",

        ];

        // Bezpečné SHA-256 hashování hesla
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        // Neprůstřelné dešifrování hex kódování zvládající kompletní českou diakritiku
        function dešifrujHex(hexStr) {
            // Vyčištění případných neočekávaných znaků
            const vycisteneHex = hexStr.replace(/[^0-9a-fA-F]/g, '');
            const bajty = new Uint8Array(vycisteneHex.length / 2);
            for (let i = 0; i < vycisteneHex.length; i += 2) {
                bajty[i / 2] = parseInt(vycisteneHex.substr(i, 2), 16);
            }
            return new TextDecoder('utf-8').decode(bajty);
        }

        // Hlavní ověření hesla
        async function overHeslo() {
            const zadaneHeslo = document.getElementById("hesloInput").value;
            const chybaElement = document.getElementById("chyba");
            
            const zadanyHash = await sha256(zadaneHeslo);

            if (zadanyHash === SPRAVNY_HASH) {
                document.getElementById("prijhlaseni").classList.add("hidden");
                document.getElementById("obsah").classList.remove("hidden");
                
                // Výběr náhodné věty a její dešifrování až za běhu v paměti telefonu
                const nahodneCislo = Math.floor(Math.random() * ZASIFROVANE_VETY.length);
                const krasnaVeta = dešifrujHex(ZASIFROVANE_VETY[nahodneCislo]);
                
                document.getElementById("veta").innerText = krasnaVeta;
            } else {
                chybaElement.innerText = "Nesprávné heslo, zkus to znovu.";
                document.getElementById("hesloInput").value = "";
            }
        }

        // Spuštění přes klávesu Enter
        document.getElementById("hesloInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                overHeslo();
            }
        });
    </script>
