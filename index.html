            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 0;
        }
        .hidden {
            display: none;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        input[type="password"]:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 85%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #chyba {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>

        // Bezpečné SHA-256 hashování hesla
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        // Funkce pro otočení textu zpátky dopředu
        function otocZpatky(text) {
            return text.split("").reverse().join("");
        }

        // Hlavní ověření hesla
        async function overHeslo() {
            const zadaneHeslo = document.getElementById("hesloInput").value;
            const chybaElement = document.getElementById("chyba");
            
            const zadanyHash = await sha256(zadaneHeslo);

            if (zadanyHash === SPRAVNY_HASH) {
                document.getElementById("prijhlaseni").classList.add("hidden");
                document.getElementById("obsah").classList.remove("hidden");
                
                // Výběr náhodné věty a její okamžité otočení
                const nahodneCislo = Math.floor(Math.random() * SKRYTE_VETY.length);
                const krasnaVeta = otocZpatky(SKRYTE_VETY[nahodneCislo]);
                
                document.getElementById("veta").innerText = krasnaVeta;
            } else {
                chybaElement.innerText = "Nesprávné heslo, zkus to znovu.";
                document.getElementById("hesloInput").value = "";
            }
        }

        // Spuštění přes klávesu Enter
        document.getElementById("hesloInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                overHeslo();
            }
        });
