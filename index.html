<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje NFC Věta</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.8rem;
            line-height: 1.4;
            margin: 0;
        }
        .hidden {
            display: none;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        input[type="password"]:focus {
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            width: 85%;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #chyba {
            color: red;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="box">
        <div id="prijhlaseni">
            <h2>Zadej heslo</h2>
            <input type="password" id="hesloInput" placeholder="Napiš heslo sem...">
            <br>
            <button onclick="overHeslo()">Vstoupit</button>
            <p id="chyba"></p>
        </div>

        <div id="obsah" class="hidden">
            <h1 id="veta">Načítám...</h1>
        </div>
    </div>

    <script>
        // Jednoduché heslo bez šifrování
        const SPRAVNE_HESLO = "18725";

        // Tady je tvých 30 vět
        const vety = [
            "Dneska to bude skvělý den!",
            "Nezapomeň se napít vody.",
            "Usměj se, sluší ti to.",
            "Udělej si dneska radost něčím malým.",
            "Chyby jsou důkazem toho, že se snažíš.",
            "Dneska zvládneš všechno, co si naplánuješ.",
            "Zastav se a na 5 vteřin se zhluboka nadechni.",
            "Někdo na tebe právě teď myslí v dobrém.",
            "Tvoje limity jsou jen v tvé hlavě.",
            "Každý den je nová šance začít znovu.",
            "Dneska je ideální čas na kávu nebo čaj.",
            "Věř si, dokázal jsi už těžší věci.",
            "Být laskavý je superschopnost.",
            "Soustřeď se na přítomný okamžik.",
            "Nezapomeň dneska někoho pochválit.",
            "Malé kroky tě taky dovedou k velkému cíli.",
            "Dnešní cíl: Žádný stres.",
            "Jsi originál, nikdo jiný na světě není jako ty.",
            "Překážky tě dělají silnějším.",
            "Zkus dneska udělat jednu věc jinak než obvykle.",
            "Máš v sobě víc síly, než si myslíš.",
            "Nečekej na dokonalý moment, vezmi tento a udělej ho dokonalým.",
            "Napiš dneska někomu, koho jsi dlouho neslyšel.",
            "Tvá energie táhne lidi k sobě.",
            "Buď hrdý na to, jak daleko jsi došel.",
            "I špatný den má jen 24 hodin.",
            "Dneska je skvělý den na to, naučit se něco nového.",
            "Udělej dneska někomu radost.",
            "Mysli na to, za co jsi v životě vděčný.",
            "Dokončeno! Jsi super!"
        ];

        // Funkce pro jednoduché ověření hesla
        function overHeslo() {
            const zadaneHeslo = document.getElementById("hesloInput").value;
            const chybaElement = document.getElementById("chyba");

            // Porovnáme text napřímo
            if (zadaneHeslo === SPRAVNE_HESLO) {
                document.getElementById("prijhlaseni").classList.add("hidden");
                document.getElementById("obsah").classList.remove("hidden");
                ukazNahodnouVetu();
            } else {
                chybaElement.innerText = "Nesprávné heslo, zkus to znovu.";
                document.getElementById("hesloInput").value = "";
            }
        }

        // Funkce, která vybere náhodnou větu
        function ukazNahodnouVetu() {
            const nahodneCislo = Math.floor(Math.random() * vety.length);
            document.getElementById("veta").innerText = vety[nahodneCislo];
        }

        // Spuštění přes Enter
        document.getElementById("hesloInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                overHeslo();
            }
        });
    </script>

</body>
</html>
